# ─── COLLECTIVE / COMMUNITY ───
collective:
  label: "The Ecomm Collaborative"
  title: "A community that sticks *after* the event ends"
  body: >
    The Ecomm Collaborative is the community side of CX Mixer. It's where brand
    leaders keep the conversations going, meet peers facing similar
    challenges, and tap into a trusted network of e-commerce operators
    who get it.
  quote: "Think of it as your industry group chat — but with better people and fewer random pitches."
  notifications:
    - "🤝 New Connection Made"
    - "🧠 Insight Shared"
    - "⭐ Tech Reviewed"
    - "📣 Hot Take Dropped"
    - "🎙 New Podcast Episode"
    - "🎉 Event Invite Sent"
  values:
    - icon: "💚"
      text: "Be generous"
    - icon: "🎯"
      text: "Keep it real"
    - icon: "💡"
      text: "Share what's useful"
    - icon: "🙏"
      text: "Respect the room"
    - icon: "🤝"
      text: "Build relationships, not transactions"
  cta: "Join Today"

