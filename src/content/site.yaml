# ─── HERO ───
hero:
  badge: "Events · Community · Podcast"
  title: "Where e‑commerce brands connect"
  title_em: "No Agenda Needed"
  subtitle: >
    CX Mixer brings together brand leaders, operators, and industry friends
    through curated events, honest conversations, and content that makes the
    e-commerce world feel a little smaller and a lot more human.
  cta_primary: "Join the Collaborative"
  cta_secondary: "See Upcoming Events"
  listen_label: "Listen on"
  video_cta: "Tap to play with sound"
  video_badge: "Sound off"

# ─── INTRO ───
intro:
  label: "What is CX Mixer"
  title: "Built for the people *behind* the brands"
  body: >
    CX Mixer is where e-commerce leaders come to meet good people, share
    what's actually working, and build relationships that go beyond a badge
    scan. From curated conference-side events to podcast conversations and
    a growing community of operators — this is a space designed for
    connection without the noise.
  cta: "Explore the Community"
  features:
    - icon: "⚡"
      title: "Curated Events"
      desc: "Intimate gatherings at the industry's biggest moments"
    - icon: "🎙"
      title: "Real Conversations"
      desc: "Operators sharing what actually works — no script"
    - icon: "🌐"
      title: "Trusted Community"
      desc: "A network that skips the pitch and shares the playbook"
    - icon: "✨"
      title: "Zero Sales Energy"
      desc: "Connection without the noise. Just great people, period."

# ─── EVENTS ───
events:
  label: "Upcoming Events"
  title: "Meet up in *real life*"
  subtitle: >
    From breakfast meetups to VIP dinners — CX Mixer events are designed in a unique way 
    to help e-commerce brands connect in a way that actually feels fun.
    No pitches. Just brands.
  cards:
    - type: "Karaoke"
      name: "Mic Drop Madness"
      desc: "Mic Drop Madness is where ecommerce operators trade dashboards for the mic and battle it out for karaoke glory. No pitches, no pressure—just great songs, questionable vocals, and a room full of people who actually get it."
      status: "05/19/26 - 9pm-12pm EST"
      url: "https://luma.com/xql5odde"
    - type: "Breakfast"
      name: "Network & Nosh - New York"
      desc: "Network & Nosh is back for year 3 —bringing ecommerce brands together at an iconic NYC spot for great food, coffee, and even better conversations. With a shuttle to the conference—no pitches, just real connections to start your day right."
      status: "05/20/26 - 7:30am-10am EST"
      featured: true
      url: "https://luma.com/abn7k9ih"
    - type: "VIP Dinner"
      name: "The Vault - VIP Dinner"
      desc: "This is an invite-only experience at an exclusive NYC spot, bringing together a curated group of ecommerce leaders for a night of incredible food, flowing drinks, and real conversation. Back for year two, this is where relationships get built, ideas get shared, and no one leaves hungry."
      status: "05/20/26 - 7pm EST"
      url: "https://luma.com/zvnk1zvn"

