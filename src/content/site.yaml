# ─── SPONSORS ───
sponsors:
  title: "Partner with the community brands *want* to be part of"
  body: >
    CX Mixer works with select sponsors who want to show up in the right
    rooms, support authentic connection, and build real visibility with
    e-commerce decision-makers.
  cta: "Become a Sponsor"

# ─── ABOUT ───
about:
  label: "About"
  title: "It started with a *simple idea*"
  body_1: >
    CX Mixer started from a belief that the best part of this industry is
    the people in it. Conferences are full of smart brands and great
    conversations, but too often the real connection gets buried under
    schedules, badges, and back-to-back pitches.
  body_2: >
    CX Mixer was built to create the kind of space where those real
    conversations could actually happen — no forced networking, no agenda
    beyond genuine connection.
  team:
    - name: "Larry Thoma"
      role: "Host & Creator"
      bio: "Larry builds the rooms where ecommerce leaders actually connect—through curated events, conversations, and a community designed to foster relationships."
      photo: "larrythoma"
      linkedin: "https://www.linkedin.com/in/larrythoma/"
    - name: "Adam Raftshol"
      role: "Operations & Sponsorships"
      bio: "Adam keeps the machine running — from event logistics to sponsor relationships, he makes sure every detail lands."
      photo: "adam_raftshol"
      linkedin: "https://www.linkedin.com/in/adamraftshol/"

# ─── CONTACT ───
contact:
  label: "Get in Touch"
  title: "Let's *connect*"
  subtitle: "Whether you want to attend, partner, sponsor, or just say hey — we'd love to hear from you."
  # Formspree form endpoint. Two formats:
  #   1. Form-ID style (recommended once a form is created at formspree.io):
  #      https://formspree.io/f/<formId>
  #   2. Legacy direct-email format (works immediately — Formspree sends a
  #      one-time verification email to the address on first submission):
  #      https://formspree.io/<email>
  # The previous URL mixed both formats which silently broke submissions.
  form_action: "https://formspree.io/Larry@CXMixer.com"
  inquiry_types:
    - "General Inquiry"
    - "Event Questions"
    - "Sponsor Inquiry"
    - "Podcast Guest"
    - "Join the Collective"

